document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

00;\n  font-display: swap;\n  src: url(\"b83f8416-454d-44ab-9333-9e936c6b9ae4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ─────────────────────────────────────────────────────\n   Marco Filella PT — Color Tokens\n   Palette: \"Crema e fuoco\"\n   ───────────────────────────────────────────────────── */\n\n:root {\n  /* ── Brand Core ────────────────────────────────── */\n  --color-crema:    #F8F2EB;   /* warm cream — main background */\n  --color-cioc:     #2E1F17;   /* dark chocolate — text, titles */\n  --color-arancio:  #F07820;   /* fire orange — accent, CTA */\n  --color-sabbia:   #9E7E6A;   /* sand — secondary text */\n\n  /* ── Extended Brand ────────────────────────────── */\n  --color-cioc-2:   #4A3228;   /* medium chocolate — hover, nav */\n  --color-bg:       #F0E8DF;   /* off-cream — page backgrounds */\n  --color-crema-2:  #FDF6EE;   /* lightest cream — table row hover */\n  --color-border:   #DDD3C8;   /* warm border */\n  --color-white:    #FFFFFF;   /* pure white — card surfaces */\n\n  /* ── Status ────────────────────────────────────── */\n  --color-success:  #27AE60;\n  --color-danger:   #E74C3C;\n  --color-warning:  #F59E0B;\n\n  /* ── Social Platforms ──────────────────────────── */\n  --color-ig:       #E1306C;   /* Instagram */\n  --color-tk:       #010101;   /* TikTok */\n  --color-tk-cyan:  #69C9D0;   /* TikTok accent */\n\n  /* ── Pillar Palette ────────────────────────────── */\n  --color-pillar-edu:   #3B82F6;\n  --color-pillar-auto:  #EC4899;\n  --color-pillar-trend: #F59E0B;\n  --color-pillar-int:   #EF4444;\n  --color-pillar-cta:   #10B981;\n\n  /* ── Semantic Aliases ──────────────────────────── */\n  --surface-bg:       var(--color-bg);\n  --surface-card:     var(--color-white);\n  --surface-dark:     var(--color-cioc);\n  --surface-dark-2:   var(--color-cioc-2);\n  --surface-accent:   var(--color-arancio);\n  --surface-crema:    var(--color-crema);\n\n  --text-primary:     var(--color-cioc);\n  --text-secondary:   var(--color-sabbia);\n  --text-on-dark:     var(--color-crema);\n  --text-accent:      var(--color-arancio);\n  --text-muted:       var(--color-sabbia);\n\n  --border-default:   var(--color-border);\n  --border-accent:    var(--color-arancio);\n}\n<\u002Fstyle>\n  <style>/* ─────────────────────────────────────────────────────\n   Marco Filella PT — Typography Tokens\n   Primary font: DM Sans (Google Fonts)\n   Brand rule: 700 for titles/hooks, 400 for body\n   ───────────────────────────────────────────────────── */\n\n:root {\n  /* ── Font Families ─────────────────────────────── */\n  --font-base: 'DM Sans', -apple-system, BlinkMacSystemFont,\n               'Segoe UI', Helvetica, Arial, sans-serif;\n  --font-mono: 'Fira Code', 'Fira Mono', 'Courier New', monospace;\n\n  /* ── Font Weights ──────────────────────────────── */\n  --weight-regular: 400;\n  --weight-medium:  500;\n  --weight-bold:    700;\n\n  /* ── Font Sizes ────────────────────────────────── */\n  --size-xs:   11px;   /* labels, captions uppercase */\n  --size-sm:   12px;   /* metadata, timestamps */\n  --size-base: 13px;   /* body text, table cells */\n  --size-md:   15px;   /* paragraph / card body */\n  --size-lg:   18px;   /* section titles, subtitles */\n  --size-xl:   22px;   /* page titles */\n  --size-2xl:  28px;   /* KPI values */\n  --size-3xl:  36px;   /* hero / slide titles */\n  --size-4xl:  48px;   /* carousel cover titles */\n\n  /* ── Line Heights ──────────────────────────────── */\n  --leading-tight:   1.15;\n  --leading-snug:    1.35;\n  --leading-normal:  1.55;\n  --leading-relaxed: 1.75;\n\n  /* ── Letter Spacing ────────────────────────────── */\n  --tracking-tight:  -0.3px;\n  --tracking-normal: 0;\n  --tracking-wide:   0.5px;\n  --tracking-wider:  0.8px;\n  --tracking-widest: 1.2px;\n\n  /* ── Semantic Aliases ──────────────────────────── */\n  --text-hook:     var(--weight-bold) var(--size-3xl)/var(--leading-tight) var(--font-base);\n  --text-title:    var(--weight-bold) var(--size-xl)/var(--leading-snug) var(--font-base);\n  --text-subtitle: var(--weight-medium) var(--size-lg)/var(--leading-snug) var(--font-base);\n  --text-body:     var(--weight-regular) var(--size-md)/var(--leading-normal) var(--font-base);\n  --text-small:    var(--weight-regular) var(--size-base)/var(--leading-normal) var(--font-base);\n  --text-label:    var(--weight-bold) var(--size-xs)/1 var(--font-base);\n}\n<\u002Fstyle>\n  <style>/* ─────────────────────────────────────────────────────\n   Marco Filella PT — Spacing, Radius & Shadow Tokens\n   ───────────────────────────────────────────────────── */\n\n:root {\n  /* ── Space Scale (4px base) ────────────────────── */\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-7:  28px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* ── Border Radius ─────────────────────────────── */\n  --radius-sm:   6px;    /* buttons sm, badges */\n  --radius-md:   8px;    /* inputs, buttons md */\n  --radius-lg:   10px;   /* cards, modals sm */\n  --radius-xl:   12px;   /* cards, panels */\n  --radius-2xl:  16px;   /* modals, large cards */\n  --radius-full: 9999px; /* pills, avatars, chips */\n\n  /* ── Shadows ────────────────────────────────────── */\n  --shadow-xs:  0 1px 4px rgba(46, 31, 23, 0.06);\n  --shadow-sm:  0 2px 8px rgba(46, 31, 23, 0.08);\n  --shadow-md:  0 4px 16px rgba(46, 31, 23, 0.12);\n  --shadow-lg:  0 8px 32px rgba(46, 31, 23, 0.20);\n  --shadow-xl:  0 16px 48px rgba(46, 31, 23, 0.28);\n\n  /* ── Border Widths ─────────────────────────────── */\n  --border-1: 1px;\n  --border-2: 2px;\n  --border-4: 4px;\n\n  /* ── Z-index Scale ─────────────────────────────── */\n  --z-base:    0;    /* @kind other */\n  --z-raised:  10;   /* @kind other */\n  --z-overlay: 100;  /* @kind other */\n  --z-modal:   1000; /* @kind other */\n  --z-toast:   2000; /* @kind other */\n\n  /* ── Transition ─────────────────────────────────── */\n  --transition-fast:   all 0.15s ease; /* @kind other */\n  --transition-normal: all 0.2s ease;  /* @kind other */\n  --transition-slow:   all 0.35s ease; /* @kind other */\n}\n<\u002Fstyle>\n  <script src=\"4e770f4b-eab4-4aab-8fe3-5a3ca7d1bb2c\"><\u002Fscript>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n    body { font-family: var(--font-base); background: var(--color-bg); }\n    input, select, button, textarea { font-family: inherit; }\n    ::-webkit-scrollbar { width: 5px; height: 5px; }\n    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 99px; }\n    ::-webkit-scrollbar-track { background: transparent; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex;flex-direction:column;height:100vh;overflow:hidden\">\n\n  <!-- ── TOP BAR ── -->\n  <div style=\"flex-shrink:0;height:50px;background:var(--color-cioc);display:flex;align-items:center;justify-content:space-between;padding:0 22px;z-index:10\">\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <div style=\"width:28px;height:28px;border-radius:var(--radius-full);background:var(--color-arancio);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--color-cioc);flex-shrink:0;letter-spacing:-0.3px\">MF<\u002Fdiv>\n      <span style=\"font-size:var(--size-base);font-weight:700;color:var(--color-crema);letter-spacing:-0.2px\">Marco Filella PT<\u002Fspan>\n    <\u002Fdiv>\n    <span style=\"font-size:var(--size-xs);color:var(--color-sabbia)\">Giugno 2026<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ── BODY ── -->\n  <!-- Banner modalità demo -->\n  <sc-if value=\"{{ isDemo }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:
